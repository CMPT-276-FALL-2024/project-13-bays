name: Weather App CI/CD

on:
  push:
    branches: [ weather ]
  pull_request:
    branches: [ weather ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run tests
      run: npm test
      env:
        CI: true
        
    - name: Build
      run: npm run build

    - name: Deploy to GitHub Pages
      if: github.ref == 'refs/heads/weather'
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: build 
      with:
        folder: build 